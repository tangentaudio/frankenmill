# FrankenMill ATC Sim Configuration
# Probe Basic / QtPyVCP — 3-axis XYZ simulator
# Based on probe_basic sample sim, axis limits from fmx3.probebasic (real machine).
# No Mesa hardware, no HMI hardware.  fatc component loaded via fatc_sim.hal.

[EMC]
MACHINE = FMX3-ATC-Sim
DEBUG = 0
VERSION = 1.1

[DISPLAY]
DISPLAY = probe_basic
OPEN_FILE = ~/linuxcnc/nc_files/pb_examples/blank.ngc
CONFIG_FILE = custom_config.yml
LOG_FILE = atc_sim.log
LOG_LEVEL = DEBUG
PREFERENCE_FILE = atc_sim.pref
INTRO_GRAPHIC = pbsplash.png
INTRO_TIME = 2
POSITION_OFFSET = RELATIVE
POSITION_FEEDBACK = ACTUAL
MAX_FEED_OVERRIDE = 2.000000
MAX_SPINDLE_OVERRIDE = 1.200000
MIN_SPINDLE_OVERRIDE = 0.500000
DEFAULT_SPINDLE_SPEED = 300
DEFAULT_LINEAR_VELOCITY = 2.000000
MAX_LINEAR_VELOCITY = 3.333
MIN_LINEAR_VELOCITY = 0.016670
DEFAULT_ANGULAR_VELOCITY = 12.000000
MAX_ANGULAR_VELOCITY = 180.000000
MIN_ANGULAR_VELOCITY = 1.666667
PROGRAM_PREFIX = ~/linuxcnc/nc_files
INCREMENTS = JOG .01in .001in .0001in
GEOMETRY = XYZ
DRO_DISPLAY = XYZ
OFFSET_COLUMNS = XYZ
TOOL_TABLE_COLUMNS = TZDR
USER_BUTTONS_PATH = user_buttons/
USER_DROS_PATH = user_dro_display/
USER_TABS_PATH = user_tabs/
KEYBOARD_JOG = true
# ATC tab: 0=none, 1=carousel, 2=rack
ATC_TAB_DISPLAY = 1
EDITOR = gedit
CYCLE_TIME = 100

[FILTER]
PROGRAM_EXTENSION = .nc,.txt,.tap Other NC files
PROGRAM_EXTENSION = .png,.gif,.jpg Greyscale Depth Image
png = image-to-gcode
gif = image-to-gcode
jpg = image-to-gcode
py = python

[ATC]
# Carousel geometry
POCKETS = 12
# Z height (machine coords) for tool clamp/unclamp
Z_TOOL_CHANGE_HEIGHT = -13.5
# TC_HEIGHT: Z machine coordinate where the drawbar engages the tool.
# Positive = up, negative = down from machine Z home (top of travel).
# Tune this: start shallow (e.g. -0.5) and creep down until the collet
# seats fully. ~1.5" below Z home is a typical starting point.
TC_HEIGHT = -1.5
# Z clearance height (machine coords) — above all tools during rotation
Z_TOOL_CLEARANCE_HEIGHT = 0.000
# Approximate time (ms) for one pocket step (used for ATC tab GFX only)
STEP_TIME = 500

# fatc serial/component settings (used by fatc component, not LinuxCNC core)
SERIAL_PORT = /dev/ttyUSB0
BAUD_RATE = 115200
LINEAR_AXIS = X
ROTATION_AXIS = C
POCKET_1_POSITION = 0.0
ROTATION_FULL_TURN = 360.0
LINEAR_RETRACT_POSITION = 0.0
LINEAR_EXTEND_POSITION = 100.0
ROTATION_FEEDRATE = 3000
LINEAR_FEEDRATE = 2000
SERIAL_TIMEOUT = 2.0
HOME_TIMEOUT = 30.0
MOVE_TIMEOUT = 15.0
DRAWBAR_CLAMP_TIMEOUT = 2.0
DRAWBAR_UNCLAMP_TIMEOUT = 2.0
STARTUP_TIMEOUT = 10.0
STATE_FILE = fatc_state.json
POLL_INTERVAL = 0.01
# startup | first-use | machine-enable | manual
AUTO_HOME = manual
# Set to 1 to allow operation without homing (for bench dev)
HOMING_REQUIRED = 0
DEBUG = 1

[TASK]
TASK = milltask
CYCLE_TIME = 0.010

[RS274NGC]
RS274NGC_STARTUP_CODE = F10 S300 G20 G17 G40 G49 G54 G64 P.001 G80 G90 G91.1 G92.1 G94 G97 G98
PARAMETER_FILE = sim.var
OWORD_NARGS = 1
NO_DOWNCASE_OWORD = 1
SUBROUTINE_PATH = subroutines
USER_M_PATH = subroutines
ON_ABORT_COMMAND = O<on_abort> CALL
# --- Experiment 3: minimal M6 remap test (disabled) ---
# REMAP = M6 modalgroup=6 prolog=change_prolog ngc=test_remap_m6 epilog=change_epilog
# --- Phase 3: full tool-change sequencer ---
REMAP = M6 modalgroup=6 prolog=change_prolog ngc=toolchange epilog=change_epilog

[PYTHON]
PATH_PREPEND = python
TOPLEVEL = python/toplevel.py

[EMCMOT]
EMCMOT = motmod
COMM_TIMEOUT = 1.0
BASE_PERIOD = 100000
SERVO_PERIOD = 1000000

[HAL]
HALUI = halui
HALFILE = hallib/core_sim.hal
HALFILE = hallib/sim_home.hal
HALFILE = hallib/spindle_sim.hal
HALFILE = hallib/fatc_sim.hal
POSTGUI_HALFILE = hallib/probe_basic_postgui.hal
TWOPASS = on

[HALUI]

[KINS]
JOINTS = 3
KINEMATICS = trivkins coordinates=XYZ

[TRAJ]
COORDINATES = XYZ
LINEAR_UNITS = inch
ANGULAR_UNITS = degree
DEFAULT_LINEAR_VELOCITY = 0.50
MAX_LINEAR_VELOCITY = 3.333

[EMCIO]
EMCIO = io
CYCLE_TIME = 0.100
TOOL_TABLE = tool.tbl
TOOL_CHANGE_QUILL_UP = 1

#==================
#      X Axis
#==================

[AXIS_X]
MAX_VELOCITY = 3.333
MAX_ACCELERATION = 15.0
MIN_LIMIT = -0.001
MAX_LIMIT = 16.0

[JOINT_0]
TYPE = LINEAR
HOME = 0.5
MAX_VELOCITY = 3.333
MAX_ACCELERATION = 15.0
BACKLASH = 0.003
INPUT_SCALE = 4000
OUTPUT_SCALE = 1.000
MIN_LIMIT = -0.001
MAX_LIMIT = 16.0
FERROR = 0.050
MIN_FERROR = 0.010
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 0
HOME_LATCH_VEL = 0
HOME_USE_INDEX = NO
HOME_IGNORE_LIMITS = NO
HOME_SEQUENCE = 2
HOME_IS_SHARED = 1

#==================
#      Y Axis
#==================

[AXIS_Y]
MAX_VELOCITY = 3.0
MAX_ACCELERATION = 15.0
MIN_LIMIT = -0.001
MAX_LIMIT = 6.600

[JOINT_1]
TYPE = LINEAR
HOME = 0.5
MAX_VELOCITY = 3.0
MAX_ACCELERATION = 15.0
BACKLASH = 0.003
INPUT_SCALE = 4000
OUTPUT_SCALE = 1.000
MIN_LIMIT = -0.001
MAX_LIMIT = 6.600
FERROR = 0.050
MIN_FERROR = 0.010
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 0
HOME_LATCH_VEL = 0
HOME_USE_INDEX = NO
HOME_IGNORE_LIMITS = NO
HOME_SEQUENCE = 2
HOME_IS_SHARED = 1

#==================
#      Z Axis
#==================

[AXIS_Z]
MAX_VELOCITY = 2.667
MAX_ACCELERATION = 12.0
MIN_LIMIT = -14.500
MAX_LIMIT = 0.001

[JOINT_2]
TYPE = LINEAR
HOME = 0.0
MAX_VELOCITY = 2.667
MAX_ACCELERATION = 12.0
BACKLASH = 0.003
INPUT_SCALE = 4000
OUTPUT_SCALE = 1.000
MIN_LIMIT = -14.500
MAX_LIMIT = 0.001
FERROR = 0.050
MIN_FERROR = 0.010
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 0
HOME_LATCH_VEL = 0
HOME_USE_INDEX = NO
HOME_IGNORE_LIMITS = NO
HOME_SEQUENCE = 1
HOME_IS_SHARED = 1

#==================
#     Spindle
#==================

[SPINDLE_0]
P = 0
I = 0
D = 0
FF0 = 1
FF1 = 0
FF2 = 0
BIAS = 0
DEADBAND = 0
MAX_OUTPUT = 2000
