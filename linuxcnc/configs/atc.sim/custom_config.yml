# custom_config.yml — FMX3 ATC Sim
# QtPyVCP / Probe Basic machine-specific settings for 3-axis XYZ mill sim.

windows:
  mainwindow:
    kwargs:
      confirm_exit: false

data_plugins:
  tooltable:
    provider: qtpyvcp.plugins.tool_table:ToolTable
    kwargs:
      columns: TZDR
      # fatc manages tool-in-spindle state; disable PB's built-in restore
      # which issues M61 Q{n} on homing and conflicts with fatc's authority.
      remember_tool_in_spindle: false

  offsettable:
    provider: qtpyvcp.plugins.offset_table:OffsetTable
    kwargs:
      columns: "XYZ"

  # fatc_sync removed — DynFATC handles startup sync internally

settings:

  # VTK backplot view settings
  backplot.show-grid:
    default_value: false

  backplot.show-program-bounds:
    default_value: false

  backplot.show-program-labels:
    default_value: false

  backplot.show-program-ticks:
    default_value: false

  backplot.show-machine-bounds:
    default_value: false

  backplot.show-machine-labels:
    default_value: false

  backplot.show-machine-ticks:
    default_value: false

  backplot.perspective-view:
    default_value: false

  backplot.multitool-colors:
    default_value: True
